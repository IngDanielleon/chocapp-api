services:

  nginx:
    image: nginx:1.25-alpine
    container_name: ${CONTAINER_PREFIX}_nginx
    volumes:
      - ./docker-files/nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html
    ports:
      - "${EXPOSED_PORT}:80"
    restart: unless-stopped
    networks:
      - chocapp
    depends_on:
      app:
        condition: service_healthy

  app:
    container_name: ${CONTAINER_PREFIX}_app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker-files/php/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - chocapp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: mysql:8.0
    container_name: ${CONTAINER_PREFIX}_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_DATABASE}
      MYSQL_USER:          ${DB_USERNAME}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - chocapp_db_data:/var/lib/mysql
      - ./docker-files/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - chocapp
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX}_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - chocapp_redis_data:/data
    networks:
      - chocapp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    container_name: ${CONTAINER_PREFIX}_scheduler
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - chocapp
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    depends_on:
      app:
        condition: service_healthy

  queue:
    container_name: ${CONTAINER_PREFIX}_queue
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - chocapp
    command: >
      php artisan queue:work redis
        --sleep=3
        --tries=3
        --max-time=3600
        --queue=notifications,pdf,default
    depends_on:
      app:
        condition: service_healthy

networks:
  chocapp:
    driver: bridge

volumes:
  chocapp_db_data:
  chocapp_redis_data:
